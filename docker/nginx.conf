user www-data; # Jalankan worker Nginx sebagai www-data
worker_processes auto; # Biarkan Nginx menentukan jumlah worker optimal
pid /run/nginx.pid;

# Untuk image Alpine, module path mungkin tidak diperlukan atau berbeda.
# include /etc/nginx/modules-enabled/*.conf; # Biasanya tidak ada di Alpine secara default

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Sembunyikan versi Nginx untuk keamanan

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Virtual Host Configs
    # Baris ini akan meng-include semua file .conf dari direktori http.d
    # Pastikan ini sesuai dengan path di mana site.conf Anda disalin di Dockerfile.
    # Pada image nginx:alpine, defaultnya adalah /etc/nginx/http.d/default.conf atau /etc/nginx/conf.d/default.conf
    # Jika Dockerfile Anda menyalin ke /etc/nginx/http.d/default.conf:
    include /etc/nginx/http.d/*.conf;
    # Jika Dockerfile Anda menyalin ke /etc/nginx/conf.d/default.conf:
    # include /etc/nginx/conf.d/*.conf;
}
