# docker/nginx.conf
server {
    # Cloud Run set $PORT, Nginx harus listen di port ini. Default biasanya 8080.
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _; # Menangkap semua host
    root /var/www/html/public; # Root direktori Laravel Anda
    index index.php index.html index.htm;

    # Logging ke stdout/stderr agar Cloud Run bisa menangkapnya
    access_log /dev/stdout;
    error_log /dev/stderr info; # 'info' untuk error log yang lebih detail jika perlu

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Sesuaikan nama socket dengan versi PHP Anda & konfigurasi Supervisor
        # Contoh untuk PHP 8.4, nama service di supervisor mungkin php8.4-fpm
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock; # Pastikan ini sesuai dengan service PHP-FPM di supervisor.conf
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Tingkatkan buffer jika ada header besar dari Laravel (jarang terjadi tapi mungkin)
        # fastcgi_buffers 16 16k;
        # fastcgi_buffer_size 32k;
        include fastcgi_params;
    }

    # Blok akses ke file .env dan file sensitif lainnya
    location ~ /\.env {
        deny all;
    }
    location ~ /\.git {
        deny all;
    }
    location ~ /\.user\.ini {
        deny all;
    }
    location = /composer.json {
        deny all;
    }
    location = /composer.lock {
        deny all;
    }
    location = /package.json {
        deny all;
    }
    location = /package-lock.json {
        deny all;
    }
    location = /vite.config.js {
        deny all;
    }

    # Aturan untuk aset statis agar tidak diproses PHP (opsional, untuk performa)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf|eot)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Blok akses ke direktori lain yang tidak seharusnya publik
    location ~ ^/(storage|bootstrap|config|database|resources|routes|tests|vendor)/ {
        deny all;
    }
}