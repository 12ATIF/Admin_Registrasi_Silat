server {
    listen 8080 default_server; # Cloud Run akan meneruskan traffic ke port ini
    listen [::]:8080 default_server;

    # Penting: Ganti example.com dengan domain Anda jika spesifik, 
    # atau biarkan _ untuk menangkap semua host yang diarahkan ke kontainer ini.
    server_name _; 

    root /var/www/html/public; # Direktori public Laravel Anda

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php index.html index.htm;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Aktifkan error pages kustom Laravel jika ada
    # error_page 404 /index.php; 

    location ~ \.php$ {
        try_files $uri =404; # Untuk menghindari eksekusi file yang tidak ada
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # fastcgi_pass unix:/var/run/php/php8.2-fpm.sock; # Jika PHP-FPM berjalan via socket
        fastcgi_pass 127.0.0.1:9000; # Jika PHP-FPM berjalan via TCP port (sesuai konfigurasi default PHP-FPM di image)
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param DOCUMENT_ROOT $realpath_root; # Tambahkan ini untuk kejelasan
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300; # Tambah timeout jika aplikasi Anda butuh waktu lama
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Logging spesifik untuk virtual host ini (opsional, bisa tumpang tindih dengan global log)
    # access_log /var/log/nginx/project_access.log;
    # error_log /var/log/nginx/project_error.log error;
}
