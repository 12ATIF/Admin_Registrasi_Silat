name: Deploy Admin App to Cloud Run

on:
  push:
    branches:
      - development

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_ARTIFACT_REGISTRY_REGION: 'asia-southeast2' # misalnya, asia-southeast1
  GCP_CLOUD_RUN_REGION: 'asia-southeast2' # misalnya, asia-southeast1
  APP_NAME_SLUG: 'aplikasi-laravel-silat' # Nama image Docker untuk aplikasi admin
  CLOUD_RUN_SERVICE_NAME: 'admin-service' # Nama layanan Cloud Run untuk admin

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WIF_POOL_ID }}/providers/${{ secrets.GCP_WIF_PROVIDER_ID }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Docker image
      # working-directory: ./ # Tidak perlu jika Dockerfile ada di root repositori ini
      run: |
        docker build -t "${{ env.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/laravel-apps/${{ env.APP_NAME_SLUG }}:${{ github.sha }}" .
        docker push "${{ env.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/laravel-apps/${{ env.APP_NAME_SLUG }}:${{ github.sha }}"

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.CLOUD_RUN_SERVICE_NAME }} \
          --image "${{ env.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/laravel-apps/${{ env.APP_NAME_SLUG }}:${{ github.sha }}" \
          --platform managed \
          --region ${{ env.GCP_CLOUD_RUN_REGION }} \
          --allow-unauthenticated \
          --port 8000 \
          --set-env-vars "APP_ENV=production" \
          --set-env-vars "APP_DEBUG=false" \
          --set-env-vars "APP_URL=${{ secrets.ADMIN_APP_URL }}" \
          --set-env-vars "APP_KEY=${{ secrets.ADMIN_APP_KEY }}" \
          --set-env-vars "DB_CONNECTION=mysql" \
          --set-env-vars "DB_DATABASE=${{ secrets.DB_DATABASE }}" \
          --set-env-vars "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
          --set-env-vars "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
          --set-env-vars "DB_HOST=/cloudsql/${{ secrets.GCP_SQL_INSTANCE_CONNECTION_NAME }}" \
          --set-env-vars "LOG_CHANNEL=stackdriver" \
          --set-env-vars "SESSION_DRIVER=database" \
          --set-env-vars "CACHE_DRIVER=database" \
          --set-env-vars "FILESYSTEM_DISK=gcs" \
          --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}" \
          --set-env-vars "GCS_BUCKET=${{ secrets.GCS_BUCKET_NAME }}" \
          --add-cloudsql-instances "${{ secrets.GCP_SQL_INSTANCE_CONNECTION_NAME }}" \
          --quiet

    # === LANGKAH MIGRASI DATABASE (HANYA DI SATU REPOSITORI!) ===
    # Pilih salah satu repositori (misalnya, admin) untuk menangani migrasi.
    # Jika ini adalah repositori yang bertanggung jawab:
    - name: Run Database Migrations (Admin App - Bertanggung Jawab Migrasi)
      if: success() # Pastikan langkah ini hanya ada di workflow repositori yang dipilih untuk migrasi
      env:
          # Perlu ENV VARS ini untuk koneksi database selama migrasi
          DB_HOST_PLAIN: ${{ secrets.DB_HOST_PLAIN_FOR_MIGRATION }} # IP Publik Cloud SQL atau cara lain untuk terhubung dari runner
          DB_PORT: ${{ secrets.DB_PORT_FOR_MIGRATION }}
          # Variabel lain seperti DB_DATABASE, DB_USERNAME, DB_PASSWORD sudah ada di secrets
      run: |
        echo "INFO: Menjalankan migrasi database dari repositori admin..."
        # Pastikan runner GitHub Actions dapat mengakses database Anda.
        # Ini mungkin memerlukan pembukaan IP runner GitHub Actions di firewall Cloud SQL jika menggunakan IP publik.
        # Atau, gunakan koneksi melalui Cloud SQL Proxy jika bisa di-setup di runner.
        # Pendekatan paling sederhana (tapi kurang aman untuk koneksi DB publik):
        # Ganti DB_HOST di file .env sementara atau set variabel lingkungan langsung
        # php artisan migrate --force

        # Pendekatan yang lebih baik untuk migrasi di CI/CD adalah dengan Cloud Run Job
        # atau dengan memperbarui sementara layanan Cloud Run untuk menjalankan perintah migrasi seperti contoh sebelumnya.
        # Karena menjalankan 'php artisan migrate' langsung dari GitHub runner ke Cloud SQL bisa kompleks terkait jaringan/keamanan,
        # pertimbangkan untuk memicu Cloud Build atau menggunakan gcloud untuk menjalankan perintah di Cloud Run seperti contoh sebelumnya.

        # Contoh menggunakan pembaruan layanan Cloud Run (seperti di jawaban sebelumnya):
        TEMP_IMAGE_FOR_MIGRATION="${{ env.GCP_ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/laravel-apps/${{ env.APP_NAME_SLUG }}:${{ github.sha }}"
        ORIGINAL_CMD="/usr/bin/supervisord" # Sesuaikan dengan CMD di Dockerfile Anda
        ORIGINAL_ARGS="-c /etc/supervisord.conf" # Sesuaikan

        gcloud run services update ${{ env.CLOUD_RUN_SERVICE_NAME }} \
          --image "$TEMP_IMAGE_FOR_MIGRATION" \
          --region "${{ env.GCP_CLOUD_RUN_REGION }}" \
          --command "php" \
          --args "artisan,migrate,--force" \
          --platform "managed" \
          --quiet

        sleep 60 # Tunggu migrasi

        gcloud run services update ${{ env.CLOUD_RUN_SERVICE_NAME }} \
          --image "$TEMP_IMAGE_FOR_MIGRATION" \
          --region "${{ env.GCP_CLOUD_RUN_REGION }}" \
          --command "$ORIGINAL_CMD" \
          --args "$ORIGINAL_ARGS" \
          --platform "managed" \
          --quiet
        echo "INFO: Migrasi database dari repositori admin selesai."
