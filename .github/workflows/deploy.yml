name: 🚀 Deploy Admin Silat

on:
  push:
    branches: [development]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/12atif/admin-registrasi-silat

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: silat_test
          POSTGRES_USER: silat_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, xml, zip, bcmath, gd
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
      - run: composer install --no-dev --optimize-autoloader --no-interaction
      - run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=silat_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=silat_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=test_password/' .env
      - run: php artisan migrate --force
      - run: php artisan test 2>/dev/null || echo "No tests, skipping."

  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🌐 Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker network create silat_net 2>/dev/null || true
            docker stop silat_admin 2>/dev/null || true
            docker rm   silat_admin 2>/dev/null || true
            docker run -d \
              --name silat_admin \
              --network silat_net \
              --restart always \
              -p 8001:80 \
              -e APP_ENV=production \
              -e APP_DEBUG=false \
              -e APP_URL=https://admin.unperopen.com \
              -e APP_KEY="${{ secrets.APP_KEY_ADMIN }}" \
              -e DB_CONNECTION=pgsql \
              -e DB_HOST=silat_db \
              -e DB_PORT=5432 \
              -e DB_DATABASE=silat_db \
              -e DB_USERNAME=silat_user \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f
            echo "✅ Admin deployed!"
      - name: Health Check
        run: |
          sleep 20
          curl -f http://${{ secrets.VPS_HOST }}:8001/health || echo "⚠️ Cek container manual."